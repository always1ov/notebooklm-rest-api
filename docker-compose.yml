services:
  api:
    image: ghcr.io/always1ov/notebooklm-rest-api:latest
    ports:
      - "8000:8000"
      - "6080:6080"  # noVNC login UI — only needed when running /v1/start-login
    environment:
      - NOTEBOOKLM_REST_API_KEY=${NOTEBOOKLM_REST_API_KEY:-}
      - NOTEBOOKLM_STORAGE_PATH=/auth/storage_state.json
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - WATCH_PATHS=${WATCH_PATHS:-}
      - WATCH_POLL_SECONDS=${WATCH_POLL_SECONDS:-30}
      - WATCH_MIN_AGE_SECONDS=${WATCH_MIN_AGE_SECONDS:-60}
      - TRANSCRIBE_WAIT_SECONDS=${TRANSCRIBE_WAIT_SECONDS:-300}
      - NOTEBOOKLM_TIMEOUT_SECONDS=${NOTEBOOKLM_TIMEOUT_SECONDS:-120}
      - TRANSCRIPTIONS_FOLDER=/transcriptions
      - DOWNSTREAM_WEBHOOK_URL=${DOWNSTREAM_WEBHOOK_URL:-}
      - NOTIFY_WEBHOOK_URL=${NOTIFY_WEBHOOK_URL:-}
    volumes:
      - ./auth:/auth                     # storage_state.json + browser_profile/ go here
      - ./watch:/watch                   # mount upstream audio folder here
      - ./transcriptions:/transcriptions # downstream reads new .txt files from here
    restart: unless-stopped
