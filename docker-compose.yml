services:
  notebooklm-api:
    image: ghcr.io/always1ov/notebooklm-rest-api:latest
    container_name: notebooklm-api
    restart: unless-stopped

    volumes:
      - ./auth:/auth                     # storage_state.json + browser_profile/ go here
      - ./watch:/watch                   # mount upstream audio folder here
      - ./transcriptions:/transcriptions # downstream reads new .txt files from here

    environment:
      - NOTEBOOKLM_REST_API_KEY=
        # ⚠️ 填上你的 API Key，留空则无需验证，建议填写
      - NOTEBOOKLM_STORAGE_PATH=/auth/storage_state.json
        # Google 登录状态存储路径
      - HTTP_PROXY=http://192.168.0.168:10809
      - HTTPS_PROXY=http://192.168.0.168:10809
        # 需要走代理才能访问 Google NotebookLM
      - WATCH_PATHS=/watch
        # 监听的音频文件夹（容器内路径），多个用逗号分隔；留空则关闭自动监听
        # 这里对应下面挂载的 ./watch:/watch
      - WATCH_FOLDER=/watch
        # /transcribe 按文件名查找时的目录，需与挂载路径一致（默认是 /uploads）
      - WATCH_POLL_SECONDS=30
        # 轮询间隔（秒）
      - WATCH_MIN_AGE_SECONDS=60
        # 文件最少静置多久才处理，避免处理还在写入的文件
      - TRANSCRIBE_WAIT_SECONDS=300
        # 等待转录完成的最长时间（秒）
      - NOTEBOOKLM_TIMEOUT_SECONDS=120
        # 调用 NotebookLM 的超时时间（秒）
      - TRANSCRIPTIONS_FOLDER=/transcriptions
        # 转录结果输出目录
      - DOWNSTREAM_WEBHOOK_URL=
        # 转录完成后回调的下游 Webhook，留空则不回调
      - NOTIFY_WEBHOOK_URL=
        # 通知用 Webhook，留空则不通知

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.notebooklm.rule=Host(`notebooklm.always1ov.com`)"
      - "traefik.http.routers.notebooklm.entrypoints=websecure"
      - "traefik.http.routers.notebooklm.tls.certresolver=cloudflare"

      # 纯 API 服务：
      # - rate-limit：防止接口被频繁调用
      # - internal-only：只允许内网访问
      # 不加压缩和安全头：没有浏览器页面，这些对 API 意义不大
      - "traefik.http.routers.notebooklm.middlewares=rate-limit@docker,internal-only@docker"

      # 容器内部端口是 8000，Traefik 转发到这里
      - "traefik.http.services.notebooklm.loadbalancer.server.port=8000"

    networks:
      - traefik-net

networks:
  traefik-net:
    external: true
    # 使用 Traefik 那边已经建好的网络，不重复创建
